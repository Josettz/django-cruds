{% extends 'billing/base.html' %}
{% block content %}
<h2>{% if object %}Editar{% else %}Nuevo{% endif %} empleado</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-success">Guardar</button>
  <a href="{% url 'empleados:list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
